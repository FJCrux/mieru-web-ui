name: Release

on:
  push:
    tags: ['v*']

# Least privilege by default; each job elevates only what it needs.
permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}

jobs:
  checks:
    # Same checks as branch CI; also uploads the built SPA as an artifact.
    uses: ./.github/workflows/ci.yml

  publish:
    # latest points at the newest release.
    needs: checks
    if: github.event.repository.fork == false
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v7

      # buildx: multi-platform builds and the GHA layer cache. The Dockerfile
      # cross-compiles both arches on the build platform, so no QEMU needed.
      - uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/fjcrux/imugi-panel
          tags: |
            type=raw,value=latest
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          build-args: |
            VERSION=${{ github.ref_name }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  release:
    # Create a GitHub Release with cross-compiled binaries + autogenerated notes.
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v7
        with:
          go-version: '1.25'

      # The SPA built (and checked) by the checks job; go:embed picks it up.
      - name: Download SPA artifact
        uses: actions/download-artifact@v8
        with:
          name: spa-dist
          path: internal/webfs/dist

      - name: Cross-compile panel binaries
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          mkdir -p dist
          for target in linux/amd64 linux/arm64 darwin/amd64 darwin/arm64; do
            os=${target%/*}; arch=${target#*/}
            out="dist/mieru-web-ui_${VERSION}_${os}_${arch}"
            CGO_ENABLED=0 GOOS=$os GOARCH=$arch go build -trimpath \
              -ldflags="-s -w -X main.version=${VERSION}" \
              -o "$out" ./cmd/mieru-web-ui
            (cd dist && sha256sum "$(basename "$out")" >> checksums.txt)
          done
          ls -la dist

      - name: Create release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          files: dist/*
          body: |
            ## Docker (recommended)

            ```sh
            docker pull ghcr.io/fjcrux/imugi-panel:${{ github.ref_name }}
            ```

            Or pin the minor / use `latest`. Images are built for amd64 and
            arm64. See the
            [README](https://github.com/FJCrux/mieru-web-ui#quick-start-docker)
            for the compose quick start.

            ## Binaries

            Standalone panel binaries are attached below (the Docker image is
            the normal way to run it — these are for `--no-supervise` / split
            deployments where `mita` runs separately). Verify with
            `checksums.txt`.
