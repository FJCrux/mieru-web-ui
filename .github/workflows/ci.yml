name: CI

on:
  push:
    branches: ['**']
  pull_request:
  # Reused by release.yml so tags get the same checks before publishing.
  workflow_call:

permissions:
  contents: read

# Supersede in-flight runs on the same branch; never cancel a release's checks.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ !startsWith(github.ref, 'refs/tags/') }}

jobs:
  build:
    # Same-repo PRs are already covered by the branch push; run the
    # pull_request event only for PRs from forks.
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name != github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v7
        with:
          go-version: '1.25'

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Check mieru version pins are in sync
        run: make check-version

      - name: Build frontend
        run: cd web && npm ci && npm run build

      - name: gofmt
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "gofmt needed on:" && echo "$unformatted" && exit 1
          fi

      - name: Go vet
        run: go vet ./...

      - name: Go test
        run: go test ./...

      - name: Build binary (verifies go:embed against fresh SPA)
        run: go build ./...

      # Only release runs (via workflow_call on a tag) need the SPA later;
      # the release job reuses it instead of rebuilding.
      - name: Upload SPA for the release workflow
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-artifact@v7
        with:
          name: spa-dist
          path: internal/webfs/dist
          retention-days: 1
