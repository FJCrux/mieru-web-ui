name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:

# Least privilege by default; the publish job elevates only what it needs.
permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Check mieru version pins are in sync
        run: make check-version

      - name: Go vet
        run: go vet ./...

      - name: Go test
        run: go test ./...

      - name: Build frontend
        run: cd web && npm ci && npm run build

      - name: Build binary (verifies go:embed against fresh SPA)
        run: go build ./...

  docker-build:
    # Validate the image builds (no push) on branches and PRs.
    if: ${{ !startsWith(github.ref, 'refs/tags/v') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        run: docker build -f docker/Dockerfile -t mieru-web-ui:ci .

  publish:
    # Publish images only on version tags (never on main pushes, forks, or PRs).
    # latest points at the newest release.
    needs: build
    if: startsWith(github.ref, 'refs/tags/v') && github.repository == 'fjcrux/mieru-web-ui'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/fjcrux/mieru-web-ui
          tags: |
            type=raw,value=latest
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          push: true
          build-args: |
            VERSION=${{ github.ref_name }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  release:
    # Create a GitHub Release with autogenerated notes on version tags.
    needs: publish
    if: startsWith(github.ref, 'refs/tags/v') && github.repository == 'fjcrux/mieru-web-ui'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          body: |
            Docker image: `ghcr.io/fjcrux/mieru-web-ui:${{ github.ref_name }}`
